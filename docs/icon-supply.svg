  <rect x="166" y="16" width="58" height="40" rx="5" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="174" y="26" width="42" height="5" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="174" y="35" width="30" height="5" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="174" y="44" width="36" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
