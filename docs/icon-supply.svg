  <rect x="238" y="152" width="56" height="6" rx="2" fill="rgba(255,255,255,0.38)"/>
  <rect x="238" y="163" width="42" height="6" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="238" y="174" width="50" height="6" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="238" y="185" width="34" height="6" rx="2" fill="rgba(255,255,255,0.14)"/>
  <!-- Red tall canister right -->
  <rect x="310" y="140" width="40" height="64" rx="7" fill="#8a1818" opacity="0.88"/>
  <rect x="316" y="136" width="28" height="10" rx="5" fill="#aa2020"/>
  <rect x="310" y="162" width="40" height="16" rx="2" fill="rgba(255,255,255,0.12)"/>
  <!-- Teal right box -->
  <rect x="358" y="144" width="40" height="60" rx="6" fill="#0e6a68" opacity="0.88"/>
  <rect x="364" y="155" width="28" height="5" rx="2" fill="rgba(255,255,255,0.28)"/>
  <rect x="364" y="165" width="20" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="364" y="175" width="24" height="5" rx="2" fill="rgba(255,255,255,0.15)"/>

  <!-- scan highlight line -->
  <rect x="0" y="131" width="400" height="1.5" fill="rgba(74,232,152,0.4)"/>
