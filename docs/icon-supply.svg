  <rect x="14" y="150" width="64" height="5" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="14" y="168" width="52" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="14" y="178" width="40" height="5" rx="2" fill="rgba(255,255,255,0.15)"/>
  <!-- level bar -->
  <rect x="14" y="188" width="64" height="8" rx="3" fill="rgba(0,0,0,0.3)"/>
  <rect x="14" y="188" width="48" height="8" rx="3" fill="#4a90e8" opacity="0.7"/>
  <!-- Orange medium box -->
