  <!-- shelf rail mid -->
  <rect x="0" y="132" width="400" height="6" rx="2" fill="rgba(42,200,120,0.25)"/>
  <!-- shelf rail bottom -->
  <rect x="0" y="206" width="400" height="6" rx="2" fill="rgba(42,200,120,0.25)"/>

  <!-- ===== TOP SHELF (y 0–58) ===== -->
  <!-- Big amber bottle left -->
  <rect x="10" y="10" width="44" height="46" rx="6" fill="#c97820" opacity="0.9"/>
  <rect x="18" y="6" width="28" height="10" rx="5" fill="#e8951a" opacity="0.85"/>
  <rect x="10" y="22" width="44" height="8" rx="2" fill="rgba(255,255,255,0.15)"/>
  <!-- Blue container -->
  <rect x="62" y="14" width="52" height="42" rx="5" fill="#1a4fa8" opacity="0.88"/>
  <rect x="62" y="14" width="52" height="12" rx="5" fill="#2660c8" opacity="0.9"/>
  <rect x="72" y="30" width="32" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="72" y="38" width="22" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Green flask tall -->
