  <rect x="164" y="147" width="20" height="8" rx="4" fill="#22a050"/>
  <rect x="194" y="154" width="28" height="48" rx="5" fill="#1e8a4a" opacity="0.85"/>
  <rect x="198" y="151" width="20" height="8" rx="4" fill="#28b458"/>
