  <rect x="136" y="79" width="52" height="5" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="136" y="101" width="40" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Cyan tall bottle -->
