  <rect x="288" y="10" width="24" height="9" rx="4" fill="#7a3ab8"/>
  <!-- Teal large box -->
  <rect x="326" y="8" width="68" height="48" rx="6" fill="#0e7068" opacity="0.85"/>
  <rect x="334" y="18" width="52" height="6" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="334" y="28" width="38" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="334" y="38" width="44" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>

