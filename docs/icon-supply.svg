  <rect x="248" y="72" width="50" height="56" rx="5" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <rect x="256" y="82" width="34" height="5" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="256" y="91" width="24" height="5" rx="2" fill="rgba(255,255,255,0.28)"/>
  <rect x="256" y="100" width="30" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>
