<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f1a"/>
      <stop offset="100%" stop-color="#122a22"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- shelf unit frame -->
  <rect x="110" y="30" width="180" height="180" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(42,200,120,0.25)" stroke-width="1.5"/>
  <!-- vertical divider -->
  <rect x="200" y="30" width="2" height="180" fill="rgba(42,200,120,0.15)"/>
  <!-- shelf line 1 -->
  <rect x="110" y="90" width="180" height="2" fill="rgba(42,200,120,0.2)"/>
  <!-- shelf line 2 -->
  <rect x="110" y="150" width="180" height="2" fill="rgba(42,200,120,0.2)"/>
  <!-- top-left: box A -->
  <rect x="122" y="50" width="34" height="30" rx="4" fill="#2a8a5a" opacity="0.85"/>
  <rect x="122" y="50" width="34" height="9" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="136" y="50" width="4" height="9" fill="rgba(255,255,255,0.3)"/>
  <!-- top-left: box B -->
  <rect x="162" y="56" width="26" height="24" rx="4" fill="#1e6e47" opacity="0.8"/>
  <!-- top-right: canister -->
  <rect x="212" y="46" width="22" height="36" rx="5" fill="#3aaa72" opacity="0.75"/>
  <rect x="215" y="44" width="16" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>
  <!-- top-right: small box -->
  <rect x="242" y="58" width="32" height="24" rx="4" fill="#2a8a5a" opacity="0.7"/>
  <rect x="242" y="58" width="32" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- mid-left: flask -->
  <ellipse cx="140" cy="122" rx="14" ry="10" fill="#3aaa72" opacity="0.7"/>
  <rect x="136" y="104" width="8" height="18" rx="2" fill="#2a8a5a" opacity="0.8"/>
  <rect x="133" y="103" width="14" height="5" rx="2" fill="rgba(255,255,255,0.25)"/>
  <!-- mid-left: container -->
  <rect x="158" y="108" width="30" height="24" rx="4" fill="#1e6e47" opacity="0.8"/>
  <rect x="161" y="116" width="24" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="161" y="121" width="18" height="3" rx="1" fill="rgba(255,255,255,0.2)"/>
  <!-- mid-right: two small boxes -->
  <rect x="212" y="110" width="26" height="20" rx="4" fill="#3aaa72" opacity="0.75"/>
  <rect x="244" y="114" width="28" height="16" rx="4" fill="#2a8a5a" opacity="0.8"/>
  <!-- bottom-left: large container -->
  <rect x="120" y="162" width="48" height="32" rx="5" fill="#2a8a5a" opacity="0.85"/>
  <rect x="120" y="162" width="48" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
  <rect x="138" y="162" width="6" height="10" fill="rgba(255,255,255,0.2)"/>
  <!-- level indicator -->
  <rect x="124" y="175" width="40" height="5" rx="2" fill="rgba(0,0,0,0.3)"/>
  <rect x="124" y="175" width="28" height="5" rx="2" fill="#4be898" opacity="0.7"/>
  <!-- bottom-right: boxes -->
  <rect x="210" y="164" width="32" height="28" rx="4" fill="#1e6e47" opacity="0.8"/>
  <rect x="248" y="168" width="24" height="24" rx="4" fill="#3aaa72" opacity="0.7"/>
  <!-- scan line glow -->
  <rect x="110" y="119" width="180" height="1" fill="rgba(74,232,152,0.35)"/>
</svg>
